data:
  dataset_root: /home/damelikassym/RetailS/RetailS
  train_pose_dir: RetailS_train/pose/train
  staged_pose_dir: RetailS_test_staged/pose/test
  staged_gt_dir: RetailS_test_staged/gt/test_frame_mask
  real_pose_dir: RetailS_test_realworld/pose/test
  real_gt_dir: RetailS_test_realworld/gt/test_frame_mask

features:
  window_size: 48
  stride: 8
  min_track_len: 24
  min_confidence: 0.05

train:
  seed: 42
  hidden_size: 256
  latent_size: 256
  num_layers: 2
  dropout: 0.25
  lr: 0.0005
  weight_decay: 0.00001
  epochs: 8
  grad_clip_norm: 1.0
  num_workers: 8
  batch_size: auto
  max_train_windows: 240000
  mixed_precision: true

inference:
  train_threshold_quantile: 0.99
  person_aggregation: max
  frame_fill_value: 0.0

eval:
  primary_metric: hprs
